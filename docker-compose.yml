# Docker Compose for local development.
# Builds the opencode sandbox image. API (:3001) and Web (:3000) run on host
# via npm run dev:api:llm / npm run dev:web, using DockerSandboxRunner.

services:
  sandbox:
    build:
      context: .
      dockerfile: sandbox/Dockerfile
      additional_contexts:
        agent-core: ../agent-core
    image: agent-builder-sandbox:latest
    # Build-only: image is used by API's DockerSandboxRunner at runtime.
    command: echo "sandbox image ready — start API with npm run dev:api:llm"
